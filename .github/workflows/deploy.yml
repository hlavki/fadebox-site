name: Deploy Site

# Builds the Astro site and deploys it to this repository's GitHub Pages,
# served at https://hlavki.github.io/fadebox-site/. Uses the official
# first-party Pages actions with OIDC — no secrets or deploy keys to manage.
#
# One-time setup (no secret needed):
#   hlavki/fadebox-site → Settings → Pages → Source: "GitHub Actions".
#
# To later switch to the fadebox.dev custom domain: set base back to '/' in
# astro.config.mjs, re-add public/CNAME (fadebox.dev), and set the custom
# domain in Settings → Pages with DNS pointed at GitHub Pages.

on:
  push:
    branches: [master]
  workflow_dispatch:

# OIDC-based deploy: read the repo, write to Pages, mint the id-token. No secret.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
