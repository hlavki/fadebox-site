name: Deploy to fadebox.dev

# Builds the Astro site and publishes the static output to the separate
# hlavki/fadebox.dev repository, which serves the custom domain via GitHub Pages.
#
# Required one-time setup (see the repo README / PR notes):
#   1. Generate an SSH deploy key:
#        ssh-keygen -t ed25519 -C "fadebox-site deploy" -f deploy_key -N ""
#   2. In hlavki/fadebox.dev  → Settings → Deploy keys: add deploy_key.pub
#      with "Allow write access".
#   3. In hlavki/fadebox-site → Settings → Secrets and variables → Actions:
#      add secret DEPLOY_KEY = contents of the private deploy_key file.
#   4. In hlavki/fadebox.dev → Settings → Pages: set the source branch to the
#      publish_branch below (main) and the custom domain to fadebox.dev.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Never run two deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-fadebox-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to hlavki/fadebox.dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          # SSH deploy key with write access to the target repo (recommended:
          # scoped to that one repo). To use a Personal Access Token instead,
          # replace this line with: personal_token: ${{ secrets.DEPLOY_TOKEN }}
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: hlavki/fadebox.dev
          publish_dir: ./dist
          publish_branch: main
          # Writes a CNAME file so GitHub Pages keeps serving the custom domain.
          cname: fadebox.dev
          # Keep the target repo lean: one deploy commit, no accumulating history.
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy from fadebox-site@${{ github.sha }}'
